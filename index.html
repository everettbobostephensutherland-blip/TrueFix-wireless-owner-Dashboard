import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";


import { 

getAuth,

createUserWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";



import {

getDatabase,
ref,
set,
get,
onValue

}

from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";



import {

getStorage

}

from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";





const firebaseConfig = {

apiKey: "AIzaSyDnlNyHtqiR6n1RtLErbpBs55snGK_Z3Yk",

authDomain: "truefix-dashboard.firebaseapp.com",

databaseURL:"https://truefix-dashboard-default-rtdb.firebaseio.com",

projectId:"truefix-dashboard",

storageBucket:"truefix-dashboard.firebasestorage.app",

messagingSenderId:"999290275627",

appId:"1:999290275627:web:ef443cf92f75b0117fa76e",

measurementId:"G-LK0QQW9PZC"

};



const appFirebase = initializeApp(firebaseConfig);


const auth = getAuth(appFirebase);


const database = getDatabase(appFirebase);


const storage = getStorage(appFirebase);





const loginScreen =
document.getElementById("loginScreen");


const createScreen =
document.getElementById("createScreen");


const app =
document.getElementById("app");





document.getElementById("showCreate")
.onclick=()=>{

loginScreen.style.display="none";

createScreen.style.display="flex";

};



document.getElementById("backLogin")
.onclick=()=>{

createScreen.style.display="none";

loginScreen.style.display="flex";

};





document.getElementById("loginBtn")
.onclick=async()=>{


const email =
document.getElementById("loginEmail").value;


const password =
document.getElementById("loginPassword").value;



await signInWithEmailAndPassword(
auth,email,password
);


};




document.getElementById("forgotBtn")
.onclick=async()=>{


const email =
document.getElementById("loginEmail").value;


await sendPasswordResetEmail(
auth,email
);


alert("Password reset sent");


};




document.getElementById("createBtn")
.onclick=async()=>{


const password =
document.getElementById("createPassword").value;


const confirm =
document.getElementById("confirmPassword").value;



if(password!==confirm){

alert("Passwords do not match");

return;

}



const account =
await createUserWithEmailAndPassword(

auth,

document.getElementById("createEmail").value,

password

);



await set(
ref(database,
"users/"+account.user.uid),

{

firstName:
document.getElementById("firstName").value,

lastName:
document.getElementById("lastName").value,

email:
account.user.email,

created:
Date.now()

}

);


};





onAuthStateChanged(auth,user=>{


if(user){

loginScreen.style.display="none";

createScreen.style.display="none";

app.style.display="block";


}else{


app.style.display="none";

loginScreen.style.display="flex";


}



});

<script type="module">



/* ===========================
HOME SYSTEM
=========================== */



let currentUser = null;





onAuthStateChanged(auth,user=>{


currentUser=user;


if(user){

loadHomeData();


}


});







async function loadHomeData(){


if(!currentUser)return;



const userRef =
ref(database,
"users/"+currentUser.uid);



const snapshot =
await get(userRef);



if(snapshot.exists()){


const data=snapshot.val();



renderDashboard(data);


}


}








function renderDashboard(data){



const dashboard =
document.querySelector(".stat-card");



if(!dashboard)return;




let name =
data.firstName || "User";




dashboard.innerHTML=`

<h2>
Welcome ${name}
</h2>


<p>
Your TrueFix business dashboard is active.
</p>


`;



}







/* ===========================
SAVE ACTIVITY
=========================== */


async function addActivity(text){


if(!currentUser)return;



const id =
Date.now();



await set(

ref(
database,

"users/"+currentUser.uid+
"/activity/"+id
),

{

text:text,

time:id


}


);


}








/* ===========================
NOTIFICATIONS
=========================== */


pages.notifications = ()=>{

>

};







async function loadNotifications(){



if(!currentUser)return;



const notifRef =
ref(
database,

"users/"+currentUser.uid+
"/notifications"

);




onValue(notifRef,snapshot=>{


const list =
document.getElementById(
"notificationList"
);


if(!list)return;



list.innerHTML="";



snapshot.forEach(child=>{


const item =
document.createElement("div");


item.className="list-item";


item.innerHTML =
child.val().text;


list.appendChild(item);



});



});



}

.padStart(2,"0");

(seconds%60)
.toString()
.padStart(2,"0");

document.getElementById(
"laborTime"
);

display.innerText =

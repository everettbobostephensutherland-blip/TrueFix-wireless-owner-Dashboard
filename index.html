window.showCreateAccount=function(){

placeholder="Last Name">

window.createAccount=async function(){



let first =
document.getElementById("firstName").value;



let last =
document.getElementById("lastName").value;



let email =
document.getElementById("createEmail").value;



let password =
document.getElementById("createPassword").value;



let confirm =
document.getElementById("confirmPassword").value;






if(
!first ||
!last ||
!email ||
!password
){

alert(
"Fill in every field"
);

return;

}






if(password!==confirm){


alert(
"Passwords do not match"
);


return;


}






try{



let result =

await createUserWithEmailAndPassword(

window.auth,

email,

password

);







await set(

ref(
db,
"users/"+result.user.uid
),

{


firstName:first,


lastName:last,


email:email,



createdAt:Date.now(),



theme:{


background:"#050505",


blue:"#008cff",


text:"#ffffff"


},



businessName:"TrueFix Wireless",



accounts:[email]



}



);





alert(
"Account created!"
);




}



catch(e){


alert(
e.message
);


}



};









window.loginUser=async function(){



let email =

document.getElementById("loginEmail").value;



let password =

document.getElementById("loginPassword").value;





try{


await signInWithEmailAndPassword(

window.auth,

email,

password

);



}



catch(e){


alert(
e.message
);


}



};










showLogin();









// load saved theme later

onAuthStateChanged(auth,async(user)=>{


if(user){


let snap =

await get(

ref(
db,
"users/"+user.uid

)

);




if(snap.exists()){


let data=snap.val();



if(data.theme){



document.documentElement.style
.setProperty(
"--bg",
data.theme.background
);



document.documentElement.style
.setProperty(
"--blue",
data.theme.blue
);



document.documentElement.style
.setProperty(
"--text",
data.theme.text
);



}



}



}



});






</script>

// ============================
// ACCOUNT SWITCHING
// ============================




window.switchAccount=async function(){



let accounts =
JSON.parse(

localStorage.getItem(
"truefixAccounts"
)

||

"[]"

);




if(accounts.length===0){


alert(
"No saved accounts"
);


return;


}





let email =
prompt(

"Enter account email"

);





if(!email)return;





if(!accounts.includes(email)){


alert(
"Account not found on this device"
);


return;


}



alert(

"Please sign in again with: "+email

);





await signOut(auth);



};











// ============================
// CREATE ACCOUNT
// ============================




window.createNewAccount=function(){


showCreateAccount();



};












// ============================
// SAVE ACCOUNT LIST
// ============================




onAuthStateChanged(
window.auth,
user=>{


if(user){



let list =

JSON.parse(

localStorage.getItem(
"truefixAccounts"
)

||

"[]"

);




if(!list.includes(user.email)){



if(list.length>=5){


list.shift();


}



list.push(
user.email
);



localStorage.setItem(

"truefixAccounts",

JSON.stringify(list)

);



}



}



});

.forEach(x=>{

.toLowerCase()
.includes(text)

}


});

"searchResults"
)
.innerHTML=results;



};
